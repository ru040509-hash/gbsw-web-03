<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>문자열 Switch</title>
    </head>
    <body>
        <input id="input" type="text" />
        <button id="btn" type="button">확인</button>
        <div id="print"></div>
    </body>
</html>
<script>
    document.getElementById("btn").onclick = function () {
        
        let char = document.getElementById("input").value;
        let result = null;
    
        switch (char) {
            case 'y': 
                result = "작업을 수행하겠습니다.";
                break;
            case 'n': 
                result = "작업을 수행하지 않겠습니다.";
                break;
            default: 
                result = "유효하지 않은 문자입니다.";
                break;
        } 
        
        document.getElementById("print").textContent = result;
    };
</script>
